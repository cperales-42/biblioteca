services:
  db:
    image: mysql:8.0
    container_name: biblioteca-db
    environment:
      MYSQL_DATABASE: biblioteca
      MYSQL_ROOT_PASSWORD: cperales
    ports:
      - "3306:3306"
    volumes:
      - ./db/biblioteca.sql:/docker-entrypoint-initdb.d/biblioteca.sql
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pcperales"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: .
    container_name: biblioteca-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/biblioteca?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: cperales
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
